# 本地开发：仅启动 MySQL，后端和前端在本地用 npm 跑
version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: server-asset-mysql-dev
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: server_asset
      MYSQL_USER: app
      MYSQL_PASSWORD: app123456
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
